  <style>
  
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
 margin: 0;
  overflow-x: hidden;
 
}

/* Background spline */
.spline-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
}

/* Container */
.container {
  max-width: 1300px;
  width: 100%;
  margin: auto;
  padding: 10px;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
}

/* Logo */


.logo{
display: flex;
align-items: center;
gap: -5px;
}

.logo img {
  width: 80px;
  hyphens: auto;
}

.logo-name {
  font-size: 28px;
  font-weight: bold;
  background: linear-gradient(135deg, #3b82f6, #89bffd);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.menu-toggle{
  display: none;
  cursor: pointer;
}
.menu-toggle .bar{
  display: block;
  width: 25px;
  height: 3px;
  margin: 5px auto;
  background-color: white;
  transition: all 0.3s ease;
}

/* NAV */
nav {
  display: flex ;
  gap: 30px;
}

nav a {
  color: white;
  text-decoration: none;
  font-size: 18px;
}

nav a:hover {
  color: #89bffd;
}

/* Lang menu */




.show {
  display: block;
}

/* MAIN */
main {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 90vh;
  text-align: center;
}

/* CONTENT */
.content {
  max-width: 600px;
}

.content h1 {
  font-size: 50px;
  color: white;
  margin-bottom: 20px;
}

.content p {
  font-size: 18px;
  color: white;
  margin-bottom: 20px;
}

/* BUTTON */
.btn-services {
  display: inline-block;
  padding: 14px 25px;
  border-radius: 30px;
  text-decoration: none;
  font-weight: bold;
  color: white;
  position: relative;
  overflow: hidden;
}

/* Animated border */
.btn-services::before {
  content: "";
  position: absolute;
  inset: -2px;
  border-radius: 30px;
  background: linear-gradient(90deg, #051846, #c8fdff, #000e3a);
  background-size: 300%;
  z-index: -1;
  animation: borderMove 3s linear infinite;
}

.btn-services::after {
  content: "";
  position: absolute;
  inset: 2px;
  background: rgba(0, 0, 0, 0.7);
  border-radius: 30px;
  z-index: -1;
}

@keyframes borderMove {
  0% { background-position: 0%; }
  100% { background-position: 300%; }
}

/* CONTACT BUTTON */
.btn-contactez-nous {
  padding: 10px 20px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(135deg, #3b82f6, #89bffd);
  color: white;
  cursor: pointer;
}

/* MOBILE RESPONSIVE */
@media (max-width: 768px) {

  header {
    flex-direction: row-reverse;
    gap: 5px;
  }


  .logo{
   
    gap: 8px;
    order: 1;
    
  }

  .logo img{
    width: 40px;
  }

 .logo-name{
  font-size: 18px;
  letter-spacing: 1px;
 }


  .menu-toggle {
    display: block; /* Affiche le hamburger */
    z-index: 100;
    order: 2;
  }

  nav a {
    position: fixed;
    top: 0;
    right: -100%; /* Cache le menu à droite de l'écran */
    width: 70%;    /* Largeur du menu mobile */
    height: 100vh;
    background: rgba(10, 10, 20, 0.95); /* Fond sombre transparent */
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 30px;
    transition: 0.4s right ease; /* Animation de glissement */
    z-index: 99;
  }

  /* Quand le menu est ouvert */
  nav a .active {
    right: 0; /* Le menu glisse vers la gauche pour apparaître */
  }


  nav {
   display: flex;
   align-items: center;
  }
 
  .btn-contactez-nous{
    padding: 8px 15px;
    font-size: 14px;
    margin: 0;
    order: 3;
  }

  .content h1 {
    font-size: 30px;
  }

  .content p {
    font-size: 14px;
  }

}
  </style>
</head>

<script>
    const btnLangue = document.getElementById('btn-langue');
    const menuLangues = document.getElementById('menu-langues');

    // On bascule l'affichage au clic
    btnLangue.addEventListener('click', (e) => {
        e.stopPropagation(); // Empêche de fermer immédiatement le menu
        menuLangues.classList.toggle('show');
    });

    // Ferme le menu si on clique n'importe où ailleurs sur l'écran
    window.addEventListener('click', () => {
        menuLangues.classList.remove('show');
    });
</script>
 


 <script>
  const menu = document.querySelector('#mobile-menu');
const navLinks = document.querySelector('nav a');

menu.addEventListener('click', () => {
  navLinks.classList.toggle('active'); // Ouvre/Ferme le menu
  
  // Animation optionnelle du hamburger en "X"
  menu.classList.toggle('is-active');
});
 </script>
